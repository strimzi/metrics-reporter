name = TestConfig

appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss.SSS} %highlight{%-5p} [%c{1}] %m%n

rootLogger.level = INFO
rootLogger.appenderRef.console.ref = STDOUT

logger.kafka.name = org.apache.kafka
logger.kafka.level = WARN

logger.docker.name = com.github.dockerjava
logger.docker.level = WARN

logger.testcontainers.name = org.testcontainers
logger.testcontainers.level = INFO